<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tak for din besked - TjenerVikar</title>
    <meta name="description" content="Tak for din besked. Vi vender tilbage til dig hurtigst muligt." />
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --bg-navy: #0a1628;
        --bg-content: #f8fafc;
        --surface: #ffffff;
        --fg: #0a1628;
        --fg-light: #ffffff;
        --muted: #64748b;
        --border: #e2e8f0;
        --accent: #2563eb;
        --accent-hover: #1d4ed8;
        --accent-light: #dbeafe;
        --warm-accent: #f59e0b;
        --success: #10b981;

        --font-display: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;

        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 16px;

        --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-body);
        background-color: var(--bg-navy);
        color: var(--fg-light);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .thank-you-card {
        background-color: var(--surface);
        color: var(--fg);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        max-width: 540px;
        width: 100%;
        padding: 48px 32px;
        text-align: center;
      }

      .success-icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 24px;
        background-color: var(--success);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .success-icon svg {
        width: 36px;
        height: 36px;
        color: white;
      }

      .thank-you-card h1 {
        font-family: var(--font-display);
        font-size: 28px;
        font-weight: 700;
        color: var(--fg);
        margin-bottom: 16px;
      }

      .thank-you-card p {
        font-size: 16px;
        color: var(--muted);
        line-height: 1.6;
        margin-bottom: 32px;
      }

      .btn {
        display: inline-block;
        padding: 14px 32px;
        border-radius: var(--radius-sm);
        font-weight: 600;
        font-size: 16px;
        text-decoration: none;
        transition: all 0.2s ease;
      }

      .btn-primary {
        background-color: var(--accent);
        color: white;
      }

      .btn-primary:hover {
        background-color: var(--accent-hover);
        color: white;
        transform: translateY(-1px);
      }

      .btn-secondary {
        background-color: transparent;
        color: var(--accent);
        border: 2px solid var(--accent);
        margin-left: 12px;
      }

      .btn-secondary:hover {
        background-color: var(--accent-light);
      }

      .button-group {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      @media (max-width: 480px) {
        .thank-you-card {
          padding: 32px 20px;
        }

        .thank-you-card h1 {
          font-size: 24px;
        }

        .btn-secondary {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="thank-you-card">
      <div class="success-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <h1>Tak for din besked!</h1>
      <p>Vi har modtaget din besked og vender tilbage til dig hurtigst muligt. Hav en god dag.</p>
      <div class="button-group">
        <a href="/" class="btn btn-primary">Tilbage til forsiden</a>
        <a href="/#jobsogende" class="btn btn-secondary">Se flere muligheder</a>
      </div>
    </div>
  </body>
</html>
